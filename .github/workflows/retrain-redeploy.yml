name: Retrain and Redeploy

on:
  schedule:
    - cron: "0 2 1 * *"   # 1st of every month at 2am UTC
  workflow_dispatch:
    inputs:
      semantic_path:
        description: "S3 key for new semantic training_summary.txt"
        required: true
        default: "artifacts/semantic/openclip_enhanced_real_v1/training_summary.txt"
      aesthetic_path:
        description: "S3 key for new aesthetic training_summary.txt"
        required: true
        default: "artifacts/aesthetic/mobilenet_v3_large_fusion_real_v1/training_summary.txt"
      trigger_reason:
        description: "Reason for retraining (drift | scheduled | manual)"
        required: false
        default: "manual"

jobs:
  build-manifest:
    name: Build Dataset Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CHAMELEON_VM_IP }}
          username: cc
          key: ${{ secrets.CHAMELEON_SSH_KEY }}
          passphrase: ${{ secrets.CHAMELEON_SSH_PASSPHRASE }}
          script: |
            cd /home/cc/photoprism-proj03/Data
            source /mnt/block/.venv/bin/activate
            export $(grep -v '^#' docker/.env | xargs)
            export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/photoprism"
            dvc repro build_manifests
            dvc push

  run-training:
    name: Run Training Jobs (Sequential)
    runs-on: ubuntu-latest
    needs: build-manifest
    outputs:
      semantic_succeeded: ${{ steps.set_outcomes.outputs.semantic_succeeded }}
      aesthetic_succeeded: ${{ steps.set_outcomes.outputs.aesthetic_succeeded }}
    steps:
      - name: Trigger semantic training
        id: trigger_semantic
        run: |
          TRIGGER_REASON="${{ github.event.inputs.trigger_reason }}"
          TRIGGER_REASON="${TRIGGER_REASON:-scheduled}"
          RESPONSE=$(curl -s -X POST "${{ secrets.TRAINING_API_URL }}/train" \
            -H "Content-Type: application/json" \
            -d "{
              \"task\": \"semantic\",
              \"base_config_path\": \"configs/semantic/openclip_enhanced_real_v2.yaml\",
              \"trigger_reason\": \"${TRIGGER_REASON}\",
              \"run_test_after_training\": true,
              \"max_records\": 250,
              \"evaluation_max_records\": 50
            }")
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      - name: Wait for semantic training
        id: wait_semantic
        continue-on-error: true
        run: |
          JOB_ID="${{ steps.trigger_semantic.outputs.job_id }}"
          for i in $(seq 1 180); do
            STATUS=$(curl -s "${{ secrets.TRAINING_API_URL }}/train/status/$JOB_ID" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "[$i/180] Semantic job status: $STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            if [ "$STATUS" = "failed" ]; then echo "Semantic training failed"; exit 1; fi
            sleep 60
          done
          echo "Timeout waiting for semantic training (3 hours exceeded)"
          exit 1

      - name: Trigger aesthetic training
        id: trigger_aesthetic
        run: |
          TRIGGER_REASON="${{ github.event.inputs.trigger_reason }}"
          TRIGGER_REASON="${TRIGGER_REASON:-scheduled}"
          RESPONSE=$(curl -s -X POST "${{ secrets.TRAINING_API_URL }}/train" \
            -H "Content-Type: application/json" \
            -d "{
              \"task\": \"aesthetic\",
              \"base_config_path\": \"configs/aesthetic/mobilenet_v3_large_fusion_real_v3.yaml\",
              \"trigger_reason\": \"${TRIGGER_REASON}\",
              \"run_test_after_training\": true,
              \"max_records\": 250,
              \"evaluation_max_records\": 50
            }")
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      - name: Wait for aesthetic training
        id: wait_aesthetic
        continue-on-error: true
        run: |
          JOB_ID="${{ steps.trigger_aesthetic.outputs.job_id }}"
          for i in $(seq 1 180); do
            STATUS=$(curl -s "${{ secrets.TRAINING_API_URL }}/train/status/$JOB_ID" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "[$i/180] Aesthetic job status: $STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            if [ "$STATUS" = "failed" ]; then echo "Aesthetic training failed"; exit 1; fi
            sleep 60
          done
          echo "Timeout waiting for aesthetic training (3 hours exceeded)"
          exit 1

      - name: Set training outcomes
        id: set_outcomes
        if: always()
        run: |
          SEM="${{ steps.wait_semantic.outcome }}"
          AES="${{ steps.wait_aesthetic.outcome }}"
          echo "Semantic: $SEM | Aesthetic: $AES"
          [ "$SEM" = "success" ] && echo "semantic_succeeded=true" >> $GITHUB_OUTPUT || echo "semantic_succeeded=false" >> $GITHUB_OUTPUT
          [ "$AES" = "success" ] && echo "aesthetic_succeeded=true" >> $GITHUB_OUTPUT || echo "aesthetic_succeeded=false" >> $GITHUB_OUTPUT

  promote-and-deploy:
    name: Promote Model and Redeploy
    runs-on: ubuntu-latest
    needs: run-training
    if: always() && (needs.run-training.outputs.semantic_succeeded == 'true' || needs.run-training.outputs.aesthetic_succeeded == 'true')
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3 pyyaml

      - name: Promote semantic model
        id: promote_semantic
        if: needs.run-training.outputs.semantic_succeeded == 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          SEMANTIC_PATH="${{ github.event.inputs.semantic_path }}"
          SEMANTIC_PATH="${SEMANTIC_PATH:-artifacts/semantic/openclip_enhanced_real_v1/training_summary.txt}"
          python Serving/scripts/promote_model.py \
            --semantic-path "$SEMANTIC_PATH" \
            --semantic-only

      - name: Promote aesthetic model
        id: promote_aesthetic
        if: needs.run-training.outputs.aesthetic_succeeded == 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          AESTHETIC_PATH="${{ github.event.inputs.aesthetic_path }}"
          AESTHETIC_PATH="${AESTHETIC_PATH:-artifacts/aesthetic/mobilenet_v3_large_fusion_real_v1/training_summary.txt}"
          python Serving/scripts/promote_model.py \
            --aesthetic-path "$AESTHETIC_PATH" \
            --aesthetic-only

      - name: Check promotion result
        id: promote
        run: |
          SEM="${{ steps.promote_semantic.outcome }}"
          AES="${{ steps.promote_aesthetic.outcome }}"
          echo "Semantic promotion: $SEM | Aesthetic promotion: $AES"
          if [ "$SEM" = "success" ] || [ "$AES" = "success" ]; then
            echo "At least one model promoted — proceeding with redeployment."
          else
            echo "No models promoted — keeping current production. No redeployment."
            exit 1
          fi

      - name: Commit updated current_production.yaml
        if: steps.promote.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Serving/config/current_production.yaml
          git diff --staged --quiet || git commit -m "chore: promote new model to production [skip ci]"
          git pull --rebase origin main
          git push

      - name: Deploy to Chameleon VM
        if: steps.promote.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CHAMELEON_VM_IP }}
          username: cc
          key: ${{ secrets.CHAMELEON_SSH_KEY }}
          passphrase: ${{ secrets.CHAMELEON_SSH_PASSPHRASE }}
          script: |
            cd /home/cc/photoprism-proj03
            git pull
            docker compose -f docker/docker-compose.yml --env-file Data/docker/.env up -d --force-recreate --scale serving-api=3 serving-api nginx
            docker compose -f docker/docker-compose.yml --env-file Data/docker/.env restart embedding-worker
            echo "Redeployment complete"

      - name: Trigger backfill for updated model
        if: steps.promote.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CHAMELEON_VM_IP }}
          username: cc
          key: ${{ secrets.CHAMELEON_SSH_KEY }}
          passphrase: ${{ secrets.CHAMELEON_SSH_PASSPHRASE }}
          script: |
            cd /home/cc/photoprism-proj03
            export $(grep -v '^#' Data/docker/.env | xargs)
            export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/photoprism"
            source /mnt/block/.venv/bin/activate
            cd Data

            SEMANTIC_PROMOTED="${{ steps.promote_semantic.outcome }}"
            AESTHETIC_PROMOTED="${{ steps.promote_aesthetic.outcome }}"

            if [ "$SEMANTIC_PROMOTED" = "success" ]; then
              SEMANTIC_VERSION=$(python3 -c "import yaml; d=yaml.safe_load(open('../Serving/config/current_production.yaml')); print(d.get('semantic',{}).get('model_version','clip-ViT-B-32'))")
              echo "Triggering full re-embedding backfill for semantic model: $SEMANTIC_VERSION"
              python3 -c "
            from src.data_pipeline.db.session import SessionLocal
            from src.data_pipeline.backfill.pipeline import trigger_backfill
            db = SessionLocal()
            jobs = trigger_backfill(db, model_version='${SEMANTIC_VERSION}', reembed=True)
            db.close()
            print(f'Semantic backfill queued for {len(jobs)} images')
            "
            fi

            if [ "$AESTHETIC_PROMOTED" = "success" ]; then
              AESTHETIC_VERSION=$(python3 -c "import yaml; d=yaml.safe_load(open('../Serving/config/current_production.yaml')); print(d.get('aesthetic',{}).get('model_version','mobilenet_v3_large_fusion'))")
              echo "Triggering aesthetic-only backfill for all images: $AESTHETIC_VERSION"
              docker compose -f ../docker/docker-compose.yml --env-file ../Data/docker/.env restart backfill-worker
              python3 -c "
            from src.data_pipeline.db.session import SessionLocal
            from src.data_pipeline.backfill.pipeline import trigger_backfill
            db = SessionLocal()
            jobs = trigger_backfill(db, model_version='${AESTHETIC_VERSION}', reembed=False)
            db.close()
            print(f'Aesthetic backfill queued for {len(jobs)} images')
            "
            fi

      - name: Monitor after deploy (canary window)
        id: canary
        if: steps.promote.outcome == 'success'
        run: |
          echo "Monitoring for 3 minutes..."
          sleep 180
          ERROR_RATE=$(curl -s "${{ secrets.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=sum(rate(inference_search_total{result="error"}[5m])) / sum(rate(inference_search_total[5m]))' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1] if d['data']['result'] else '0')")
          echo "Error rate after deploy: $ERROR_RATE"
          python3 -c "
          rate = float('${ERROR_RATE}' or 0)
          if rate > 0.05:
              print(f'ERROR RATE {rate:.2%} EXCEEDS 5% THRESHOLD — ROLLBACK NEEDED')
              exit(1)
          print(f'Error rate {rate:.2%} is within threshold. Deploy stable.')
          "

      - name: Rollback on high error rate
        id: rollback
        if: steps.canary.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CHAMELEON_VM_IP }}
          username: cc
          key: ${{ secrets.CHAMELEON_SSH_KEY }}
          passphrase: ${{ secrets.CHAMELEON_SSH_PASSPHRASE }}
          script: |
            cd /home/cc/photoprism-proj03
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git revert HEAD --no-edit
            git push
            docker compose -f docker/docker-compose.yml --env-file Data/docker/.env up -d --scale serving-api=3 serving-api nginx
            echo "Rollback complete"

      - name: Open GitHub Issue if rollback failed
        if: steps.rollback.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "URGENT: Automatic rollback failed — manual intervention needed" \
            --body "## Rollback Failed

          The canary check detected a high error rate after deployment, but the automatic rollback **failed** (VM may be unreachable).

          **Immediate action required:**
          1. Check VM status at \`${{ secrets.CHAMELEON_VM_IP }}\`
          2. If VM is reachable, manually run the [Redeploy Only](../actions/workflows/redeploy-only.yml) workflow with:
             - \`force_promote: true\`
             - \`semantic_path: artifacts/semantic/openclip_enhanced_real_v1/training_summary.txt\`
             - \`aesthetic_path: artifacts/aesthetic/mobilenet_v3_large_fusion_real_v1/training_summary.txt\`
          3. Or SSH into the VM and run:
             \`\`\`
             cd /home/cc/photoprism-proj03 && git revert HEAD --no-edit && git push
             docker compose -f docker/docker-compose.yml --env-file Data/docker/.env up -d --scale serving-api=3 serving-api nginx
             \`\`\`

          **Triggered by workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "critical"
