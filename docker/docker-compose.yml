services:
  postgres:
    image: postgres:15
    container_name: postgres
    env_file: ../Data/docker/.env
    environment:
      POSTGRES_DB: photoprism
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - /mnt/block/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d photoprism"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - /mnt/block/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 15s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingestion-worker:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.worker
    container_name: ingestion-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=ingestion --concurrency=2
      --hostname=ingestion@%h
    env_file: ../Data/docker/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      WORKER_NAME: ingestion
      METRICS_PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - /mnt/block/photoprism/originals:/data/originals
      - type: bind
        source: /home/cc/originals
        target: /home/cc/originals
        bind:
          propagation: rshared
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  validation-worker:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.worker
    container_name: validation-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=validation --concurrency=2
      --hostname=validation@%h
    env_file: ../Data/docker/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SERVING_API_URL: http://serving-api:8000
      AESTHETIC_MODEL_VERSION: ${AESTHETIC_MODEL_VERSION:-mobilenet_v3_large_fusion}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      WORKER_NAME: validation
      METRICS_PORT: "8002"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.worker
    container_name: embedding-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=embedding --concurrency=1
      --hostname=embedding@%h
    env_file: ../Data/docker/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-photoprism_images}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-clip-ViT-B-32}
      CLIP_BASE_MODEL: ${CLIP_BASE_MODEL:-clip-ViT-B-32}
      CHECKPOINT_PATH: ${CHECKPOINT_PATH:-}
      SERVING_API_URL: http://serving-api:8000
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      WORKER_NAME: embedding
      METRICS_PORT: "8003"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      serving-api:
        condition: service_started
    restart: unless-stopped

  backfill-worker:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=backfill --concurrency=1
      --hostname=backfill@%h
    env_file: ../Data/docker/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CHECKPOINT_PATH: ${CHECKPOINT_PATH:-}
      SERVING_API_URL: http://serving-api:8000
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      WORKER_NAME: backfill
      METRICS_PORT: "8004"
    expose:
      - "8004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.worker
    container_name: celery-beat
    command: celery -A src.data_pipeline.workers.celery_app beat --loglevel=info
    env_file: ../Data/docker/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-clip-ViT-B-32}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  features-api:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.api
    container_name: features-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-photoprism_images}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-clip-ViT-B-32}
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - serving-api
    restart: unless-stopped

  serving-api:
    build:
      context: ../Serving
      dockerfile: Dockerfile
    expose:
      - "8000"
    deploy:
      replicas: 3
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-photoprism_images}
      MODEL_NAME: ${MODEL_NAME:-clip-ViT-B-32}
      DEVICE: ${DEVICE:-auto}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      MODEL_VERSION: ${MODEL_VERSION:-clip-ViT-B-32-v1}
      AESTHETIC_MODEL_TYPE: ${AESTHETIC_MODEL_TYPE:-mobilenet_v3_large_fusion}
      CHECKPOINT_PATH: ${CHECKPOINT_PATH:-}
      AESTHETIC_CHECKPOINT_PATH: ${AESTHETIC_CHECKPOINT_PATH:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://chi.tacc.chameleoncloud.org:7480}
      S3_BUCKET: ${S3_BUCKET:-training-module-proj03}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-AryanM27/photoprism-proj03}
    volumes:
      - ../Serving/checkpoints:/checkpoints
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/block/qdrant:/qdrant/storage
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yaml
    volumes:
      - ../Data/docker/postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    user: "nobody"
    group_add:
      - "988"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ../Data/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../Data/docker/alerts:/etc/prometheus/alerts:ro
      - /mnt/block/prometheus:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /mnt/block/grafana:/var/lib/grafana
      - ../Data/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../Data/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  photoprism:
    image: ${PHOTOPRISM_IMAGE:-photoprism-semantic:latest}
    container_name: photoprism
    env_file: ../Data/docker/.env
    ports:
      - "2342:2342"
    environment:
      PHOTOPRISM_AUTH_MODE: "password"
      PHOTOPRISM_ADMIN_USER: "admin"
      PHOTOPRISM_ADMIN_PASSWORD: ${PHOTOPRISM_PASSWORD}
      PHOTOPRISM_DATABASE_DRIVER: "postgres"
      PHOTOPRISM_DATABASE_DSN: "host=postgres port=5432 dbname=photoprism user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable TimeZone=UTC"
      PHOTOPRISM_ORIGINALS_PATH: /photoprism/originals
      PHOTOPRISM_STORAGE_PATH: /photoprism/storage
      PHOTOPRISM_SITE_URL: "http://localhost:2342/"
      PHOTOPRISM_HTTP_HOST: "0.0.0.0"
      PHOTOPRISM_HTTP_PORT: 2342
      PHOTOPRISM_SEMANTIC_ENABLED: ${PHOTOPRISM_SEMANTIC_ENABLED:-false}
      PHOTOPRISM_SEMANTIC_URI: ${PHOTOPRISM_SEMANTIC_URI:-http://serving-api:8000}
      PHOTOPRISM_SEMANTIC_RERANK: ${PHOTOPRISM_SEMANTIC_RERANK:-false}
      PHOTOPRISM_REVIEW_PHOTOS: "false"
    volumes:
      - /mnt/block/photoprism/originals:/photoprism/originals
      - /mnt/block/photoprism/storage:/photoprism/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  data-generator:
    build:
      context: ../Data
      dockerfile: docker/Dockerfile.data-generator
    container_name: data-generator
    env_file: ../Data/docker/.env
    environment:
      PHOTOPRISM_URL: ${PHOTOPRISM_URL:-http://photoprism:2342}
      PHOTOPRISM_USERNAME: ${PHOTOPRISM_USERNAME:-admin}
      PHOTOPRISM_PASSWORD: ${PHOTOPRISM_PASSWORD}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://chi.tacc.chameleoncloud.org:7480}
      S3_BUCKET: ${S3_BUCKET:-training-module-proj03}
      S3_PREFIX: ${S3_PREFIX}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MEAN_THINK_SECONDS: ${MEAN_THINK_SECONDS:-2.0}
      NUM_USERS: ${NUM_USERS:-3}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      photoprism:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
