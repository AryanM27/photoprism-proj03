events {
    worker_connections 1024;
}

http {
    upstream serving_cluster {
        server serving-api:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://serving_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
