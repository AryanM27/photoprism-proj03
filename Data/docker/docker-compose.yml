services:
  postgres:
    image: postgres:15
    container_name: postgres
    env_file: .env
    environment:
      POSTGRES_DB: photoprism
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - /mnt/block/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d photoprism"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - /mnt/block/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 15s
      retries: 5
    restart: unless-stopped

  # Replaced by Chameleon native S3 (CHI@TACC) — no local service needed

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingestion-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: ingestion-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=ingestion --concurrency=2
      --hostname=ingestion@%h
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - /mnt/block/photoprism/originals:/data/originals
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  validation-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: validation-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=validation --concurrency=2
      --hostname=validation@%h
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: embedding-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=embedding --concurrency=1
      --hostname=embedding@%h
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-photoprism_images}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-clip-ViT-B-32}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  backfill-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: backfill-worker
    command: >
      celery -A src.data_pipeline.workers.celery_app worker
      --loglevel=info --queues=backfill --concurrency=1
      --hostname=backfill@%h
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      S3_ENDPOINT_URL: https://chi.tacc.chameleoncloud.org:7480
      S3_BUCKET: training-module-proj03
      S3_PREFIX: data_arm9337
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  features-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: features-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-photoprism_images}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-clip-ViT-B-32}
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/photoprism?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/block/prometheus:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /mnt/block/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/block/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/collections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

