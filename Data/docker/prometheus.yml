global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  # Replaced by Chameleon native S3 (CHI@TACC) — MinIO scrape job removed

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: ingestion-worker
    static_configs:
      - targets: ["ingestion-worker:8001"]

  - job_name: validation-worker
    static_configs:
      - targets: ["validation-worker:8002"]

  - job_name: embedding-worker
    static_configs:
      - targets: ["embedding-worker:8003"]

  - job_name: backfill-worker
    static_configs:
      - targets: ["backfill-worker:8004"]

  - job_name: serving-api
    metrics_path: /metrics
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: label
            values: ["com.docker.compose.service=serving-api"]
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):.*"
        target_label: __address__
        replacement: "$1:8000"
      - source_labels: [__meta_docker_container_name]
        target_label: instance
