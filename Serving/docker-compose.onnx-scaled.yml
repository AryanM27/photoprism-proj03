version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: .
    expose:
      - "8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MODEL_NAME=ViT-B-32
      - DEVICE=auto
      - USE_ONNX=true
      - ONNX_TEXT_PATH=/onnx_models/text_encoder.onnx
      - ONNX_IMAGE_PATH=/onnx_models/image_encoder.onnx
    depends_on:
      - qdrant
    volumes:
      - ./checkpoints:/checkpoints
      - ~/onnx_models:/onnx_models
    deploy:
      replicas: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  qdrant_data:
