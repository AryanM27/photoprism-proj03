version: "3.9"

services:
  api:
    build: .
    container_name: serving-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MODEL_NAME=clip-ViT-B-32
      - DEVICE=auto
      # Uncomment when Milind provides a checkpoint:
      # - CHECKPOINT_PATH=/checkpoints/model.pt
    depends_on:
      - qdrant
    volumes:
      - ./checkpoints:/checkpoints   # mount Milind's checkpoint here later
    networks:
      - default
      - monitoring

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  qdrant_data:

networks:
  monitoring:
    external: true
