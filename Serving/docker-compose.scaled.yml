version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: .
    expose:
      - "8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=photoprism_images
      - MODEL_NAME=clip-ViT-B-32
      - MODEL_VERSION=clip-ViT-B-32-v1
      - DEVICE=auto
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      - qdrant
    volumes:
      - ./checkpoints:/checkpoints
    deploy:
      replicas: 3

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts:/etc/prometheus/rules

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  qdrant_data:
