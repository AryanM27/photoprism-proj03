experiment_name: aesthetic_linear_head_baseline_v3
candidate_name: aesthetic_tiny_cnn_baseline_v3

task: aesthetic

dataset:
  manifest_uri: swift://training-module-proj03/data/aesthetic_ava/manifests/aesthetic_manifest_v1.jsonl
  dataset_version: aesthetic-ava-v1
  start_index: 0
  max_records: 5000
  subset_seed: 42

model:
  type: tiny_cnn
  family: linear_head
  version: aesthetic-linear-v3
  image_size: 224
  embedding_dim: 128
  pretrained: false

training:
  batch_size: 2
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  resume: auto
  advance_chunk_on_resume: true
  log_every_n_batches: 100
  carry_optimizer_to_next_chunk: true

runtime:
  device: auto
  seed: 42
  num_workers: 2

checkpoint:
  root_dir: cache/checkpoints

output:
  artifact_dir: swift://training-module-proj03/artifacts/aesthetic/linear_head_baseline_v3
  save_history: true

storage:
  backend: object_store

evaluation:
  metrics: [mse, mae]



