experiment_name: aesthetic_linear_head_baseline

task: aesthetic

dataset:
  # manifest_path: data/manifests/aesthetic_sample.jsonl #add Training directory in front for local
  manifest_uri: swift://training-data/manifests/aesthetic_manifest_v1.jsonl
  dataset_version: aesthetic-sample-v1

model:
  family: linear_head
  version: aesthetic-linear-v1
  image_size: 224

training:
  batch_size: 2
  epochs: 5
  learning_rate: 0.001
  resume: auto

runtime:
  device: auto
  seed: 42

checkpoint:
  # root_dir: artifacts/checkpoints #add Training directory in front for local
  root_dir: cache/checkpoints 

output:
  # artifact_dir: artifacts/aesthetic/linear_head_baseline #add Training directory in front for local
  artifact_dir: swift://training-artifacts/artifacts/aesthetic/linear_head_baseline
  save_history: true

storage:
  backend: object_store