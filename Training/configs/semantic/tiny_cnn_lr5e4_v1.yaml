experiment_name: semantic_tiny_cnn_baseline_v2
candidate_name: semantic_tiny_cnn_baseline_v2

task: semantic

dataset:
  manifest_uri: swift://training-module-proj03/data/semantic_flickr30k/manifests/semantic_manifest_v1.jsonl
  dataset_version: semantic-flickr30k-v1
  start_index: 0
  max_records: 5000
  subset_seed: 42

model:
  type: tiny_cnn
  family: semantic_baseline
  version: semantic-baseline-v2
  image_size: 224
  embedding_dim: 128
  pretrained: false

training:
  batch_size: 2
  epochs: 8
  learning_rate: 0.0005
  weight_decay: 0.0001
  resume: auto
  advance_chunk_on_resume: true
  carry_optimizer_to_next_chunk: true
  log_every_n_batches: 50

runtime:
  device: auto
  seed: 42
  num_workers: 2

checkpoint:
  root_dir: cache/checkpoints

output:
  artifact_dir: swift://training-module-proj03/artifacts/semantic/semantic_tiny_cnn_baseline_v2
  save_history: true

storage:
  backend: object_store