experiment_name: semantic_openclip_vitb32_baseline

task: semantic_retrieval

dataset:
  #manifest_path: data/manifests/semantic_sample.jsonl #add Training directory in front for local
  manifest_uri: swift://training-data/manifests/semantic_manifest_v1.jsonl
  split: val

model:
  family: openclip
  variant: ViT-B-32
  pretrained: true
  tier: 1
  freeze_backbone: true
  use_mock_inference: true #false for actual runs
  embedding_dim: 512

evaluation:
  top_k: [1] #make it [1,5,10] for actual runs
  metrics:
    - recall_at_k
    - map

runtime:
  device: auto
  seed: 42

storage:
  backend: local

output:
  # artifact_dir: artifacts/semantic/openclip_vitb32_baseline #add Training directory in front for local
  artifact_dir: swift://training-artifacts/artifacts/semantic/openclip_vitb32_baseline

storage:
  backend: object_store
