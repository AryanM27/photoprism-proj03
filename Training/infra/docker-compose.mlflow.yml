version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: training-postgres
    restart: always
    environment:
      POSTGRES_USER: mlflowuser
      POSTGRES_PASSWORD: mlflowpass
      POSTGRES_DB: mlflowdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: training-mlflow
    restart: always
    depends_on:
      - postgres
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
      MLFLOW_LOGGING_LEVEL: INFO
    ports:
      - "5000:5000"
    command: >
      /bin/sh -c "pip install psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://mlflowuser:mlflowpass@postgres/mlflowdb
      --host 0.0.0.0
      --port 5000"

volumes:
  postgres_data: